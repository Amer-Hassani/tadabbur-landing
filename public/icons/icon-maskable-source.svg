<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="تدبّر">
  <defs>
    <linearGradient id="bgMask" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f6f52" />
      <stop offset="100%" stop-color="#184f3c" />
    </linearGradient>
  </defs>

  <!-- Full-bleed background (no rounded corners / no margin: the OS mask crops this) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bgMask)" />

  <!--
    Maskable safe zone = centered circle of diameter 80% (410px) per the
    W3C maskable icon spec; all meaningful content below stays inside it
    (roughly x/y 90..422) so it survives circle/squircle/rounded-square OS masks.
  -->

  <!-- Gold "ت" glyph, scaled down and centered within the safe zone -->
  <g fill="#e0b354" transform="translate(256 266) scale(0.82) translate(-256 -266)">
    <path d="M 146 296
             C 146 234 196 188 258 188
             C 320 188 366 226 366 282
             C 366 332 330 366 274 366
             C 258 366 246 354 246 338
             C 246 322 258 310 274 310
             C 298 310 314 296 314 278
             C 314 254 292 236 258 236
             C 220 236 196 258 196 296
             C 196 336 228 366 272 366
             L 272 366
             " />
    <circle cx="222" cy="150" r="20" />
    <circle cx="298" cy="150" r="20" />
  </g>
</svg>
